name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install click pyyaml pytest pyflakes
      - name: Pyflakes
        run: python -m pyflakes src/
      - name: Compile check
        run: python -m py_compile $(find src -name "*.py")
      - name: Run tests
        run: |
          python -m pytest tests/ -v
